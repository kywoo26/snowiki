name: benchmark-manual

on:
  workflow_dispatch:
    inputs:
      matrix:
        description: Path to evaluation matrix YAML
        required: true
        default: benchmarks/contracts/official_matrix.yaml
        type: string
      output:
        description: Output report path
        required: true
        default: reports/benchmark.json
        type: string
      dataset:
        description: Filter to a specific dataset (optional)
        required: false
        default: ''
        type: string
      level:
        description: Filter to a specific level (optional)
        required: false
        default: ''
        type: string
      target:
        description: Target ID to run
        required: false
        default: bm25_regex_v1
        type: string
      metric:
        description: Filter to a specific metric (optional)
        required: false
        default: ''
        type: string
      fail_fast:
        description: Stop on first failure
        required: false
        default: false
        type: boolean

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv with Python 3.14
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Restore benchmark cache
        uses: actions/cache@v4
        with:
          path: |
            benchmarks/hf
            benchmarks/materialized
          key: benchmark-manual-${{ runner.os }}-${{ hashFiles('uv.lock', 'benchmarks/contracts/official_matrix.yaml') }}
          restore-keys: |
            benchmark-manual-${{ runner.os }}-
            benchmark-${{ runner.os }}-

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Materialize benchmark datasets
        env:
          BENCHMARK_MATRIX: ${{ inputs.matrix }}
          BENCHMARK_DATASET: ${{ inputs.dataset }}
          BENCHMARK_LEVEL: ${{ inputs.level }}
        run: |
          args=(--matrix "$BENCHMARK_MATRIX")
          [ -n "$BENCHMARK_DATASET" ] && args+=(--dataset "$BENCHMARK_DATASET")
          [ -n "$BENCHMARK_LEVEL" ] && args+=(--level "$BENCHMARK_LEVEL")
          uv run snowiki benchmark-fetch "${args[@]}"

      - name: Run benchmark
        env:
          BENCHMARK_MATRIX: ${{ inputs.matrix }}
          BENCHMARK_OUTPUT: ${{ inputs.output }}
          BENCHMARK_DATASET: ${{ inputs.dataset }}
          BENCHMARK_LEVEL: ${{ inputs.level }}
          BENCHMARK_TARGET: ${{ inputs.target }}
          BENCHMARK_METRIC: ${{ inputs.metric }}
          BENCHMARK_FAIL_FAST: ${{ inputs.fail_fast }}
        run: |
          mkdir -p "$(dirname "$BENCHMARK_OUTPUT")"
          args=(--matrix "$BENCHMARK_MATRIX" --report "$BENCHMARK_OUTPUT")
          [ -n "$BENCHMARK_DATASET" ] && args+=(--dataset "$BENCHMARK_DATASET")
          [ -n "$BENCHMARK_LEVEL" ] && args+=(--level "$BENCHMARK_LEVEL")
          [ -n "$BENCHMARK_TARGET" ] && args+=(--target "$BENCHMARK_TARGET")
          [ -n "$BENCHMARK_METRIC" ] && args+=(--metric "$BENCHMARK_METRIC")
          [ "$BENCHMARK_FAIL_FAST" = 'true' ] && args+=(--fail-fast)
          uv run snowiki benchmark "${args[@]}"

      - name: Upload benchmark report artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: ${{ inputs.output }}
          if-no-files-found: error

      - name: Append workflow summary
        env:
          BENCHMARK_MATRIX: ${{ inputs.matrix }}
          BENCHMARK_OUTPUT: ${{ inputs.output }}
          BENCHMARK_DATASET: ${{ inputs.dataset }}
          BENCHMARK_LEVEL: ${{ inputs.level }}
          BENCHMARK_TARGET: ${{ inputs.target }}
          BENCHMARK_METRIC: ${{ inputs.metric }}
          BENCHMARK_FAIL_FAST: ${{ inputs.fail_fast }}
        run: |
          {
            echo "## Manual benchmark run"
            echo ""
            echo "- Matrix: \`$BENCHMARK_MATRIX\`"
            echo "- Output: \`$BENCHMARK_OUTPUT\`"
            [ -n "$BENCHMARK_DATASET" ] && echo "- Dataset filter: \`$BENCHMARK_DATASET\`"
            [ -n "$BENCHMARK_LEVEL" ] && echo "- Level filter: \`$BENCHMARK_LEVEL\`"
            [ -n "$BENCHMARK_TARGET" ] && echo "- Target filter: \`$BENCHMARK_TARGET\`"
            [ -n "$BENCHMARK_METRIC" ] && echo "- Metric filter: \`$BENCHMARK_METRIC\`"
            [ "$BENCHMARK_FAIL_FAST" = 'true' ] && echo "- Fail fast: enabled"
            echo "- Report artifact: \`benchmark-report\`"
          } >> "$GITHUB_STEP_SUMMARY"
