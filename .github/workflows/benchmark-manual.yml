name: benchmark-manual

on:
  workflow_dispatch:
    inputs:
      matrix:
        description: Path to evaluation matrix YAML
        required: true
        default: benchmarks/contracts/official_matrix.yaml
        type: string
      output:
        description: Output report path
        required: true
        default: reports/benchmark.json
        type: string
      dataset:
        description: Filter to a specific dataset (optional)
        required: false
        default: ''
        type: string
      level:
        description: Filter to a specific level (optional)
        required: false
        default: ''
        type: string
      target:
        description: Filter to a specific target (optional)
        required: false
        default: ''
        type: string
      metric:
        description: Filter to a specific metric (optional)
        required: false
        default: ''
        type: string
      fail_fast:
        description: Stop on first failure
        required: false
        default: false
        type: boolean

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv with Python 3.14
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Restore benchmark cache
        uses: actions/cache@v4
        with:
          path: |
            benchmarks/hf
            benchmarks/materialized
          key: benchmark-manual-${{ runner.os }}-${{ hashFiles('uv.lock', 'benchmarks/contracts/official_matrix.yaml') }}
          restore-keys: |
            benchmark-manual-${{ runner.os }}-
            benchmark-${{ runner.os }}-

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Materialize benchmark datasets
        run: |
          args="--matrix '${{ inputs.matrix }}'"
          [ -n '${{ inputs.dataset }}' ] && args="$args --dataset '${{ inputs.dataset }}'"
          uv run snowiki benchmark-fetch $args

      - name: Run benchmark
        run: |
          mkdir -p "$(dirname '${{ inputs.output }}')"
          args="--matrix '${{ inputs.matrix }}' --output '${{ inputs.output }}'"
          [ -n '${{ inputs.dataset }}' ] && args="$args --dataset '${{ inputs.dataset }}'"
          [ -n '${{ inputs.level }}' ] && args="$args --level '${{ inputs.level }}'"
          [ -n '${{ inputs.target }}' ] && args="$args --target '${{ inputs.target }}'"
          [ -n '${{ inputs.metric }}' ] && args="$args --metric '${{ inputs.metric }}'"
          [ '${{ inputs.fail_fast }}' = 'true' ] && args="$args --fail-fast"
          uv run snowiki benchmark $args

      - name: Upload benchmark report artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: ${{ inputs.output }}
          if-no-files-found: error

      - name: Append workflow summary
        run: |
          {
            echo "## Manual benchmark run"
            echo ""
            echo "- Matrix: \`${{ inputs.matrix }}\`"
            echo "- Output: \`${{ inputs.output }}\`"
            [ -n '${{ inputs.dataset }}' ] && echo "- Dataset filter: \`${{ inputs.dataset }}\`"
            [ -n '${{ inputs.level }}' ] && echo "- Level filter: \`${{ inputs.level }}\`"
            [ -n '${{ inputs.target }}' ] && echo "- Target filter: \`${{ inputs.target }}\`"
            [ -n '${{ inputs.metric }}' ] && echo "- Metric filter: \`${{ inputs.metric }}\`"
            [ '${{ inputs.fail_fast }}' = 'true' ] && echo "- Fail fast: enabled"
            echo "- Report artifact: \`benchmark-report\`"
          } >> "$GITHUB_STEP_SUMMARY"
