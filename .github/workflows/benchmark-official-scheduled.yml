name: benchmark-official-scheduled

on:
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_dispatch:

jobs:
  official-scheduled-benchmark:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dataset:
          - ms_marco_passage
          - trec_dl_2020_passage
          - miracl_ko
          - miracl_en
          - beir_nq
          - beir_scifact
      fail-fast: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv with Python 3.14
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Preflight dataset cache
        id: preflight
        run: |
          if uv run snowiki benchmark-fetch --dataset ${{ matrix.dataset }} --offline; then
            echo "cached=true" >> "$GITHUB_OUTPUT"
          else
            echo "cached=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Run official scheduled benchmark
        if: steps.preflight.outputs.cached == 'true'
        run: |
          mkdir -p reports
          uv run snowiki benchmark             --preset retrieval             --dataset ${{ matrix.dataset }}             --sample-mode standard             --layer scheduled_official_standard             --output "reports/${{ matrix.dataset }}.json"

      - name: Upload benchmark report artifact
        if: steps.preflight.outputs.cached == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-scheduled-${{ matrix.dataset }}
          path: reports/${{ matrix.dataset }}.json
          if-no-files-found: error

      - name: Record infra skip
        if: steps.preflight.outputs.cached != 'true'
        run: |
          mkdir -p reports
          echo '{"dataset_id":"${{ matrix.dataset }}","status":"infra_skipped","reason":"dataset not cached"}' > "reports/${{ matrix.dataset }}.json"

      - name: Upload infra skip artifact
        if: steps.preflight.outputs.cached != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-scheduled-${{ matrix.dataset }}-skipped
          path: reports/${{ matrix.dataset }}.json

      - name: Append workflow summary
        run: |
          {
            echo "## Official Scheduled Benchmark: ${{ matrix.dataset }}"
            echo ""
            if [ "${{ steps.preflight.outputs.cached }}" = "true" ]; then
              echo "- Status: completed"
              echo "- Layer: scheduled_official_standard"
              echo "- Sample mode: standard"
            else
              echo "- Status: infra_skipped"
              echo "- Reason: dataset not cached"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
