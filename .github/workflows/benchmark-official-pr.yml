name: benchmark-official-pr

on:
  pull_request:
    paths:
      - "src/snowiki/**"
      - "benchmarks/**"
      - ".github/workflows/benchmark*.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

jobs:
  official-pr-benchmark:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dataset:
          - ms_marco_passage
          - miracl_ko
          - miracl_ja
          - miracl_zh
      fail-fast: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv with Python 3.14
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Preflight dataset cache
        id: preflight
        run: |
          if uv run snowiki benchmark-fetch --dataset ${{ matrix.dataset }} --offline; then
            echo "cached=true" >> "$GITHUB_OUTPUT"
          else
            echo "cached=false" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      - name: Run official PR benchmark
        if: steps.preflight.outputs.cached == 'true'
        run: |
          mkdir -p reports
          uv run snowiki benchmark \
            --preset retrieval \
            --dataset ${{ matrix.dataset }} \
            --sample-mode quick \
            --layer pr_official_quick \
            --output "reports/${{ matrix.dataset }}.json"

      - name: Upload benchmark report artifact
        if: steps.preflight.outputs.cached == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-pr-${{ matrix.dataset }}
          path: reports/${{ matrix.dataset }}.json
          if-no-files-found: error

      - name: Record infra skip
        if: steps.preflight.outputs.cached != 'true'
        run: |
          mkdir -p reports
          echo '{"dataset_id":"${{ matrix.dataset }}","status":"infra_skipped","reason":"dataset not cached"}' > "reports/${{ matrix.dataset }}.json"

      - name: Upload infra skip artifact
        if: steps.preflight.outputs.cached != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-pr-${{ matrix.dataset }}-skipped
          path: reports/${{ matrix.dataset }}.json

      - name: Append workflow summary
        run: |
          {
            echo "## Official PR Benchmark: ${{ matrix.dataset }}"
            echo ""
            if [ "${{ steps.preflight.outputs.cached }}" = "true" ]; then
              echo "- Status: completed"
              echo "- Layer: pr_official_quick"
              echo "- Sample mode: quick"
            else
              echo "- Status: infra_skipped"
              echo "- Reason: dataset not cached"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  pr-comment:
    runs-on: ubuntu-latest
    needs: official-pr-benchmark
    if: always()
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: reports
          pattern: benchmark-pr-*

      - name: Generate PR comment
        id: generate-comment
        run: |
          {
            echo "## 📊 Official Benchmark Results"
            echo ""
            echo "| Dataset | Status | Verdict |"
            echo "| :--- | :--- | :--- |"
            
            for report_file in reports/benchmark-pr-*/reports/*.json; do
              if [ -f "$report_file" ]; then
                dataset=$(basename "$report_file" .json)
                
                # Check if infra skipped
                if grep -q '"status":"infra_skipped"' "$report_file" 2>/dev/null; then
                  echo "| $dataset | ⏭️ skipped | N/A |"
                else
                  # Extract verdict from JSON
                  verdict=$(python3 -c "import json,sys; d=json.load(open('$report_file')); v=d.get('benchmark_verdict',{}).get('verdict','UNKNOWN'); print(v)" 2>/dev/null || echo "UNKNOWN")
                  
                  if [ "$verdict" = "PASS" ]; then
                    echo "| $dataset | ✅ completed | **$verdict** |"
                  else
                    echo "| $dataset | ✅ completed | ❌ **$verdict** |"
                  fi
                fi
              fi
            done
            
            echo ""
            echo "---"
            echo ""
            echo "**Legend:**"
            echo "- ⏭️ skipped: Dataset not cached (run \`snowiki benchmark-fetch\` first)"
            echo "- ✅ completed: Benchmark finished"
            echo ""
            echo "**Note:** Full reports available as artifacts."
          } > pr_comment.md
          
          cat pr_comment.md

      - name: Post PR comment
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('pr_comment.md', 'utf8');
            
            // Find existing benchmark comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const benchmarkComment = comments.find(c => c.body.includes('📊 Official Benchmark Results'));
            
            if (benchmarkComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: benchmarkComment.id,
                body: comment
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }
