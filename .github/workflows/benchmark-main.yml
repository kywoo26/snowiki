name: benchmark-main

on:
  push:
    branches:
      - main

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv with Python 3.14
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Restore benchmark cache
        uses: actions/cache@v4
        with:
          path: |
            benchmarks/hf
            benchmarks/materialized
          key: benchmark-main-${{ runner.os }}-${{ hashFiles('uv.lock', 'benchmarks/contracts/official_matrix.yaml') }}
          restore-keys: |
            benchmark-main-${{ runner.os }}-
            benchmark-${{ runner.os }}-

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Materialize CI benchmark datasets
        run: uv run snowiki benchmark-fetch --dataset beir_nq --dataset beir_scifact --dataset trec_dl_2020_passage --dataset miracl_ko --level standard

      - name: Run standard benchmark smoke target
        run: |
          mkdir -p reports
          uv run snowiki benchmark \
            --dataset beir_nq \
            --dataset beir_scifact \
            --dataset trec_dl_2020_passage \
            --dataset miracl_ko \
            --level standard \
            --target bm25_regex_v1 \
            --report reports/benchmark-main.json

      - name: Upload benchmark report artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-main-report
          path: reports/benchmark-main.json
          if-no-files-found: error
