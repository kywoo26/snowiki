name: benchmark-pr

on:
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv with Python 3.14
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Restore benchmark cache
        uses: actions/cache@v4
        with:
          path: |
            benchmarks/hf
            benchmarks/materialized
          key: benchmark-pr-${{ runner.os }}-${{ hashFiles('uv.lock', 'benchmarks/contracts/official_matrix.yaml') }}
          restore-keys: |
            benchmark-pr-${{ runner.os }}-
            benchmark-${{ runner.os }}-

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Materialize SciFact benchmark dataset
        run: uv run snowiki benchmark-fetch --dataset beir_scifact --level quick

      - name: Run quick benchmark smoke target
        run: |
          mkdir -p reports
          uv run snowiki benchmark \
            --dataset beir_scifact \
            --level quick \
            --target bm25_regex_v1 \
            --report reports/benchmark-pr.json

      - name: Upload benchmark report artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-pr-report
          path: reports/benchmark-pr.json
          if-no-files-found: error
