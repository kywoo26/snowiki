default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: governance-advisory
        name: governance advisory report
        entry: uv run python scripts/check_governance.py --report
        language: system
        pass_filenames: false
        always_run: true
      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false
        types_or: [python, pyi]
      - id: commit-msg-governance
        name: commit message governance
        entry: uv run python scripts/check_commit_message.py
        language: system
        stages: [commit-msg]
        pass_filenames: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        args: [--branch, main]
