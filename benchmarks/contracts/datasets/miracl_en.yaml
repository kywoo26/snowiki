dataset_id: miracl_en
name: MIRACL English
language: en
purpose_tags:
  - passage-retrieval
  - multilingual
  - en
corpus_path: benchmarks/materialized/miracl_en/corpus.parquet
queries_path: benchmarks/materialized/miracl_en/queries.parquet
judgments_path: benchmarks/materialized/miracl_en/judgments.tsv
source:
  corpus:
    repo_id: miracl/miracl-corpus
    config: en
    split: train
    revision: d921ec7e349ce0d28daf30b2da9da5ee698bef0d
    loader: json
    data_files:
      - datasets/miracl/miracl-corpus/miracl-corpus-v1.0-en/*.jsonl.gz
  queries:
    repo_id: miracl/miracl
    config: en
    split: dev
    revision: 5be20db9509754dadad47689368639fcec739c00
    loader: csv
    data_files:
      - hf://datasets/miracl/miracl/miracl-v1.0-en/topics/topics.miracl-v1.0-en-dev.tsv
    load_kwargs:
      sep: "	"
      header: null
      names:
        - query-id
        - query
  judgments:
    repo_id: miracl/miracl
    config: en
    split: dev
    revision: 5be20db9509754dadad47689368639fcec739c00
    loader: csv
    data_files:
      - hf://datasets/miracl/miracl/miracl-v1.0-en/qrels/qrels.miracl-v1.0-en-dev.tsv
    load_kwargs:
      sep: "	"
      header: null
      names:
        - query-id
        - iteration
        - corpus-id
        - score
field_mappings:
  corpus_id_keys:
    - docid
    - _id
  corpus_text_keys:
    - text
    - content
    - contents
  query_id_keys:
    - query-id
    - _id
  query_text_keys:
    - query
  judgment_query_id_keys:
    - query-id
  judgment_doc_id_keys:
    - corpus-id
  judgment_relevance_keys:
    - score
supported_levels:
  - quick
  - standard
  - full
