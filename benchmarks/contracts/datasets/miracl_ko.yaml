dataset_id: miracl_ko
name: MIRACL Korean
language: ko
purpose_tags:
  - passage-retrieval
  - multilingual
  - ko
corpus_path: benchmarks/materialized/miracl_ko/corpus.parquet
queries_path: benchmarks/materialized/miracl_ko/queries.parquet
judgments_path: benchmarks/materialized/miracl_ko/judgments.tsv
source:
  corpus:
    repo_id: miracl/miracl-corpus
    config: ko
    split: train
    revision: d921ec7e349ce0d28daf30b2da9da5ee698bef0d
    loader: json
    data_files:
      - datasets/miracl/miracl-corpus/miracl-corpus-v1.0-ko/*.jsonl.gz
  queries:
    repo_id: miracl/miracl
    config: ko
    split: dev
    revision: 5be20db9509754dadad47689368639fcec739c00
    loader: csv
    data_files:
      - hf://datasets/miracl/miracl/miracl-v1.0-ko/topics/topics.miracl-v1.0-ko-dev.tsv
    load_kwargs:
      sep: "	"
      header: null
      names:
        - query-id
        - query
  judgments:
    repo_id: miracl/miracl
    config: ko
    split: dev
    revision: 5be20db9509754dadad47689368639fcec739c00
    loader: csv
    data_files:
      - hf://datasets/miracl/miracl/miracl-v1.0-ko/qrels/qrels.miracl-v1.0-ko-dev.tsv
    load_kwargs:
      sep: "	"
      header: null
      names:
        - query-id
        - iteration
        - corpus-id
        - score
field_mappings:
  corpus_id_keys:
    - docid
    - _id
  corpus_text_keys:
    - text
    - content
    - contents
  query_id_keys:
    - query-id
    - _id
  query_text_keys:
    - query
  judgment_query_id_keys:
    - query-id
  judgment_doc_id_keys:
    - corpus-id
  judgment_relevance_keys:
    - score
supported_levels:
  - quick
  - standard
